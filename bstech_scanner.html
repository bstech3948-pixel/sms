<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>(주)창성비에스 송장 스캔</title>
<style>
  :root{
    --ink:#1b2430; --steel:#2f4156; --paper:#f6f4ee; --line:#d9d3c5;
    --muted:#6b7280; --accent:#b5651d; --ok:#2f7d52; --danger:#b3261e;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;}
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 40px;}
  header{border-bottom:2px solid var(--steel);padding-bottom:10px;margin-bottom:14px;}
  header h1{font-size:19px;margin:0;font-weight:800;letter-spacing:-.02em;}
  header p{font-size:12.5px;color:var(--muted);margin:4px 0 0;}

  .cam{position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:4/3;}
  #preview{width:100%;height:100%;object-fit:cover;display:block;}
  .guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .guide .box{width:78%;height:34%;border:3px solid rgba(255,255,255,.9);border-radius:10px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.28);}
  .status{position:absolute;left:0;right:0;bottom:0;background:rgba(20,26,34,.72);color:#fff;
    font-size:12.5px;padding:7px 12px;text-align:center;}

  .btn{border:none;border-radius:10px;padding:14px 16px;font-size:15px;font-weight:800;
    cursor:pointer;font-family:inherit;width:100%;}
  .btn.primary{background:var(--steel);color:#fff;}
  .btn.stop{background:#fff;border:1px solid var(--line);color:var(--steel);}
  .btn.sm{padding:9px 12px;font-size:13px;width:auto;}
  .btn-row{display:flex;gap:8px;margin:12px 0;}

  .result{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0;}
  .result .num{font-size:22px;font-weight:800;letter-spacing:.02em;font-variant-numeric:tabular-nums;word-break:break-all;}
  .result .lab{font-size:11px;color:var(--muted);margin-bottom:4px;}
  .result.hidden{display:none;}

  .manual{display:flex;gap:8px;margin:10px 0;}
  .manual input{flex:1;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;}

  .count{font-size:13px;color:var(--muted);margin:14px 0 6px;font-weight:700;}
  .list{list-style:none;margin:0;padding:0;}
  .list li{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
    margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .list li .n{font-weight:700;font-variant-numeric:tabular-nums;word-break:break-all;}
  .list li .t{font-size:11px;color:var(--muted);white-space:nowrap;}
  .list li .rm{border:none;background:transparent;color:var(--danger);font-size:18px;cursor:pointer;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:20px;}
  .hintbox{background:#fff;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;
    font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🍖 (주)창성비에스 송장 스캔</h1>
    <p>택배 바코드를 카메라에 비추세요 · 아이폰·안드로이드 모두 지원</p>
  </header>

  <div class="cam">
    <video id="preview" playsinline muted autoplay></video>
    <div class="guide"><div class="box"></div></div>
    <div class="status" id="status">‘스캔 시작’을 누르세요</div>
  </div>

  <div class="btn-row">
    <button class="btn primary" id="startBtn">📷 스캔 시작</button>
    <button class="btn stop" id="stopBtn" style="display:none">■ 정지</button>
  </div>

  <div class="result hidden" id="result">
    <div class="lab">방금 스캔한 송장번호</div>
    <div class="num" id="resultNum"></div>
    <div class="btn-row" style="margin-bottom:0">
      <button class="btn primary sm" id="saveBtn">저장</button>
      <button class="btn stop sm" id="againBtn">다시 스캔</button>
    </div>
  </div>

  <div class="manual">
    <input id="manualInput" inputmode="numeric" placeholder="인식 안 되면 직접 입력">
    <button class="btn primary sm" id="manualBtn">추가</button>
  </div>

  <div class="count" id="count">오늘 스캔: 0건</div>
  <ul class="list" id="list"><li class="empty">아직 스캔한 송장이 없어요</li></ul>

  <div class="hintbox">
    잘 안 잡힐 때: 바코드를 화면 가운데 흰 칸에 맞추고 10~15cm 거리를 두세요.
    밝은 곳에서, 바코드와 폰을 평행하게 유지하면 인식률이 올라갑니다.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
(function(){
  const $ = (id)=>document.getElementById(id);
  const video=$("preview"), statusEl=$("status");
  const startBtn=$("startBtn"), stopBtn=$("stopBtn");
  const resultBox=$("result"), resultNum=$("resultNum");
  const KEY="bstech-scans";
  let reader=null, running=false, lastCode="", lastTime=0;

  // iOS 필수 속성 보강
  video.setAttribute("playsinline","");
  video.setAttribute("webkit-playsinline","");
  video.muted=true;

  // ---- 저장 (사용 환경에서만 유지; 미리보기에서 막혀도 앱은 동작) ----
  function loadScans(){ try{ return JSON.parse(localStorage.getItem(KEY)||"[]"); }catch(e){ return []; } }
  function saveScans(a){ try{ localStorage.setItem(KEY, JSON.stringify(a)); }catch(e){} }
  let scans = loadScans();

  const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};

  function renderList(){
    const today=todayStr();
    const cnt=scans.filter(s=>s.date===today).length;
    $("count").textContent="오늘 스캔: "+cnt+"건";
    const list=$("list");
    if(!scans.length){ list.innerHTML='<li class="empty">아직 스캔한 송장이 없어요</li>'; return; }
    list.innerHTML=scans.map((s,i)=>`<li><span class="n">${s.code}</span><span class="t">${s.time}</span><button class="rm" data-i="${i}">×</button></li>`).join("");
    list.querySelectorAll(".rm").forEach(b=>b.onclick=()=>{scans.splice(+b.dataset.i,1);saveScans(scans);renderList();});
  }

  function beep(){
    try{const c=new (window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();
      o.connect(c.destination);o.frequency.value=880;o.start();setTimeout(()=>{o.stop();c.close();},120);}catch(e){}
  }

  function showResult(code){
    resultNum.textContent=code;
    resultBox.classList.remove("hidden");
    if(navigator.vibrate) navigator.vibrate(120);
    beep();
  }

  function addScan(code){
    const now=new Date();
    const time=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    scans.unshift({code, time, date: todayStr()});
    saveScans(scans); renderList();
  }

  // ---- ZXing 스캐너 ----
  function makeReader(){
    const hints=new Map();
    const F=ZXing.BarcodeFormat;
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
      F.CODE_128, F.CODE_39, F.CODABAR, F.ITF, F.EAN_13, F.EAN_8, F.UPC_A, F.QR_CODE
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    return new ZXing.BrowserMultiFormatReader(hints, 200); // 200ms 간격
  }

  async function start(){
    if(running) return;
    if(typeof ZXing==="undefined"){ statusEl.textContent="스캐너 로딩 실패 — 인터넷 연결 확인 후 새로고침"; return; }
    statusEl.textContent="카메라 여는 중…";
    reader=makeReader();
    const onDecode=(result,err)=>{
      if(result){
        const code=result.getText();
        const t=Date.now();
        if(code===lastCode && t-lastTime<2500) return; // 중복 방지
        lastCode=code; lastTime=t;
        statusEl.textContent="인식됨: "+code;
        showResult(code);
      }
    };
    // 후면 카메라 우선 (아이폰 포함)
    const constraints={ video:{ facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720} } };
    try{
      await reader.decodeFromConstraints(constraints, "preview", onDecode);
    }catch(e){
      try{ await reader.decodeFromVideoDevice(undefined, "preview", onDecode); }
      catch(e2){ statusEl.textContent="카메라를 열 수 없어요. 브라우저 카메라 권한을 허용해 주세요."; return; }
    }
    running=true;
    startBtn.style.display="none"; stopBtn.style.display="block";
    statusEl.textContent="바코드를 흰 칸에 맞추세요";
  }

  function stop(){
    if(reader){ try{ reader.reset(); }catch(e){} }
    running=false;
    startBtn.style.display="block"; stopBtn.style.display="none";
    statusEl.textContent="정지됨 · ‘스캔 시작’을 누르세요";
  }

  startBtn.onclick=start;
  stopBtn.onclick=stop;
  $("saveBtn").onclick=()=>{ if(resultNum.textContent){ addScan(resultNum.textContent); resultBox.classList.add("hidden"); statusEl.textContent="저장됨 · 계속 스캔하세요"; } };
  $("againBtn").onclick=()=>{ resultBox.classList.add("hidden"); lastCode=""; };
  $("manualBtn").onclick=()=>{ const v=$("manualInput").value.trim(); if(v){ addScan(v); $("manualInput").value=""; } };
  $("manualInput").addEventListener("keydown",e=>{ if(e.key==="Enter"){ const v=e.target.value.trim(); if(v){ addScan(v); e.target.value=""; } } });

  renderList();
})();
</script>
</body>
</html>
